<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>랜덤 추첨기</title>

<style>
    body{
        text-align:center;
        margin-top:50px;
        font-family:맑은 고딕;
    }

    h1{
        color:navy;
    }

    button{
        font-size:20px;
        padding:10px 20px;
        cursor:pointer;
    }

    #result{
        margin-top:30px;
        font-size:30px;
        font-weight:bold;
        color:red;
    }
</style>

<script>
    // 아이스크림 목록
    const stu = [
        "엄마는외계인",
        "아몬드봉봉",
        "민트초콜릿칩",
        "레인보우샤베트",
        "뉴욕치즈케이크",
        "바닐라",
        "체리쥬빌레",
        "자모카아몬드훠지",
        "이상한나라의솜사탕",
        "소금우유",
        "오레오쿠키앤크림",
        "그린티",
        "초콜릿",
        "애플민트",
        "봄날의곰",
        "카페오레크런치",
        "두바이에서온엄마는외계인",
        "아빠는딸바봉",
        "코튼캔디크런치",
        "후르츠어드벤처"
    ];

    // 이전 결과를 저장
    let before = -1;

    function pick(){

        let random;

        // 같은 맛이 연속으로 나오지 않게 하기
        do{
            random = Math.floor(Math.random() * stu.length);
        }while(random == before);

        before = random;

        document.getElementById("result").innerHTML =
        "🍨 오늘의 아이스크림은 <br><br>" +
        stu[random] + " 입니다!";
    }
</script>

</head>

<body>

<h1>🍦 배스킨라빈스 랜덤 추첨기 🍦</h1>

<button onclick="pick()">추첨하기!</button>

<div id="result">
    버튼을 눌러주세요!
</div>

</body>
</html>
